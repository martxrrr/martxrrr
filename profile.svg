<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
  <defs>
    <style>
      /* Techy font style: Monospace, all-caps for labels */
      .tech-text {
        font-family: 'Courier New', Courier, monospace;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .panel-border {
        stroke: #22FFDD; /* Cyan border */
        stroke-width: 2;
        fill: #111111; /* Black/Dark gray background */
      }
      .panel-label {
        font-size: 24px;
        font-weight: bold;
        fill: #FFFFFF; /* White for labels */
      }
      .content-text {
        font-size: 16px;
        fill: #22FFDD; /* Cyan for general text */
      }
      .tree-node-circle {
        fill: #FF00FF; /* Magenta for root nodes */
        stroke: #FFFFFF;
        stroke-width: 1;
      }
      .tree-node-text {
        font-size: 14px;
        fill: #FFFFFF; /* White for node names */
      }
      .tree-leaf-circle {
        fill: #00FF00; /* Luminous Green for leaves */
        stroke: #FFFFFF;
        stroke-width: 1;
      }
      .tree-leaf-text {
        font-size: 12px;
        fill: #00FF00; /* Luminous Green for leaf names */
      }
      .tree-line {
        stroke: #FFFFFF;
        stroke-width: 1;
      }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#111111" />

  <g transform="translate(10, 10)">
    <rect width="320" height="580" rx="10" ry="10" class="panel-border" />
    <text x="20" y="50" class="tech-text panel-label">PERSONAL INFO</text>
    <foreignObject x="20" y="80" width="280" height="480">
      <div xmlns="http://www.w3.org/1999/xhtml" class="tech-text content-text" style="color: #22FFDD; font-size: 16px;">
        <p>HI! I'M MARTIN.</p>
        <p>I AM EXPLORING ARTIFICIAL INTELLIGENCE, MACHINE LEARNING AND DEEP LEARNING.</p>
        <p>BESIDES ROTTING ON THE COMPUTER I AM OBSESSED WITH FOOTBALL.</p>
      </div>
    </foreignObject>
  </g>

  <g transform="translate(340, 10)">
    <rect width="650" height="285" rx="10" ry="10" class="panel-border" />
    <text x="20" y="50" class="tech-text panel-label">skills stack</text>
    
    <g transform="translate(100, 100)">
      <line x1="50" y1="20" x2="50" y2="120" class="tree-line" /> <line x1="50" y1="40" x2="200" y2="40" class="tree-line" /> <line x1="50" y1="70" x2="200" y2="70" class="tree-line" /> <line x1="50" y1="100" x2="200" y2="100" class="tree-line" /> <line x1="50" y1="130" x2="200" y2="130" class="tree-line" /> <circle cx="50" cy="20" r="10" class="tree-node-circle" />
      <text x="70" y="25" class="tech-text tree-node-text">programming Languages</text>

      <g transform="translate(200, 40)">
        <circle cx="0" cy="0" r="7" class="tree-leaf-circle" />
        <text x="15" y="5" class="tech-text tree-leaf-text">python</text>
      </g>
      <g transform="translate(200, 70)">
        <circle cx="0" cy="0" r="7" class="tree-leaf-circle" />
        <text x="15" y="5" class="tech-text tree-leaf-text">c++</text>
      </g>
      <g transform="translate(200, 100)">
        <circle cx="0" cy="0" r="7" class="tree-leaf-circle" />
        <text x="15" y="5" class="tech-text tree-leaf-text">c</text>
      </g>
      <g transform="translate(200, 130)">
        <circle cx="0" cy="0" r="7" class="tree-leaf-circle" />
        <text x="15" y="5" class="tech-text tree-leaf-text">javascript</text>
      </g>
    </g>
  </g>

  <g transform="translate(340, 305)">
    <rect width="650" height="285" rx="10" ry="10" class="panel-border" />
    <text x="20" y="50" class="tech-text panel-label">more...</text>
    
    <g transform="translate(100, 100)">
       <line x1="50" y1="20" x2="50" y2="90" class="tree-line" /> <line x1="50" y1="40" x2="200" y2="40" class="tree-line" /> <line x1="50" y1="70" x2="200" y2="70" class="tree-line" /> <line x1="50" y1="100" x2="200" y2="100" class="tree-line" /> <circle cx="50" cy="20" r="10" class="tree-node-circle" />
      <text x="70" y="25" class="tech-text tree-node-text">other</text>

      <g transform="translate(200, 40)">
        <circle cx="0" cy="0" r="7" class="tree-leaf-circle" />
        <text x="15" y="5" class="tech-text tree-leaf-text">html/css</text>
      </g>
      <g transform="translate(200, 70)">
        <circle cx="0" cy="0" r="7" class="tree-leaf-circle" />
        <text x="15" y="5" class="tech-text tree-leaf-text">linux</text>
      </g>
      <g transform="translate(200, 100)">
        <circle cx="0" cy="0" r="7" class="tree-leaf-circle" />
        <text x="15" y="5" class="tech-text tree-leaf-text">git</text>
      </g>
    </g>
  </g>

</svg>
